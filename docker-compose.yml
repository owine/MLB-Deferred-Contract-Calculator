services:
  mlb-calculator:
    image: ghcr.io/owine/mlb-deferred-contract-calculator:latest
    # To build locally instead of pulling from GHCR, comment out "image" above and uncomment:
    # build:
    #   context: .
    #   dockerfile: Dockerfile
    container_name: mlb-deferred-calculator
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
